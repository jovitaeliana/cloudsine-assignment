name: CI

on:
  pull_request:
  push:
    branches-ignore:
      - main

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-test:
    name: Backend lint + tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: cloudsine
          POSTGRES_PASSWORD: change_me_in_prod
          POSTGRES_DB: cloudsine
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U cloudsine"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=10

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check .

      - name: Pytest (unit + integration)
        env:
          TEST_PG_HOST: localhost
          TEST_PG_PORT: "5432"
          TEST_PG_USER: cloudsine
          TEST_PG_PASSWORD: change_me_in_prod
        run: pytest -v

  frontend-test:
    name: Frontend build + type check
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint (tsc --noEmit)
        run: npm run lint

      - name: Build
        run: npm run build
